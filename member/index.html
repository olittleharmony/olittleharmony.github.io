<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LHO Member Area</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0d1117; --gold:#c9a84c; --gold2:#e8c97a;
      --white:#ffffff; --gray:#f5f5f5; --gray2:#e0e0e0;
      --text:#1a1a2e; --text2:#555; --red:#c62828;
      --blue:#1565c0; --radius:8px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--navy); padding: 24px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 30%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 85% 70%, rgba(201,168,76,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
    }
    .login-logo { text-align: center; margin-bottom: 36px; }
    .logo-mark {
      width: 64px; height: 64px;
      background: var(--navy); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 28px;
    }
    .login-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 400;
      color: var(--navy); letter-spacing: 1px;
    }
    .login-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 300; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label { font-size: 13px; font-weight: 500; color: var(--text); }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--gray2); border-radius: var(--radius);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--white); transition: border-color .18s; outline: none;
    }
    input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(13,17,35,0.08); }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 12px;
      border-radius: var(--radius); font-size: 14px; font-weight: 500;
      font-family: inherit; cursor: pointer; border: none; transition: all .18s;
    }
    .btn-navy { background: var(--navy); color: var(--white); }
    .btn-navy:hover:not(:disabled) { background: #1a2035; }
    .btn-navy:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1.5px solid var(--gray2);
    }
    .btn-ghost:hover { background: var(--gray); }

    .error-msg { color: var(--red); font-size: 13px; margin-bottom: 14px; display: none; }
    .link-btn {
      background: none; border: none; color: var(--blue);
      font-size: 13px; font-family: inherit; cursor: pointer; padding: 0;
    }
    .link-btn:hover { text-decoration: underline; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      position: absolute; top: 24px; left: 24px;
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 13px; font-weight: 300; transition: color .2s;
      z-index: 2;
    }
    .back-link:hover { color: #fff; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<a href="../" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M19 12H5M12 19l-7-7 7-7"/>
  </svg>
  Kembali
</a>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-mark">🎼</div>
    <h1>Member Area</h1>
    <p>Little Harmony Orchestra</p>
  </div>

  <!-- View: Login -->
  <div id="view-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error" class="error-msg"></div>
    <button class="btn btn-navy" id="btn-login" style="margin-bottom:16px">
      Masuk
    </button>
    <p style="text-align:center;font-size:13px;color:#888">
      <button class="link-btn" onclick="showView('forgot')">Lupa password?</button>
    </p>
  </div>

  <!-- View: Lupa Password -->
  <div id="view-forgot" style="display:none">
    <p style="font-size:14px;color:#555;margin-bottom:18px;line-height:1.6">
      Masukkan email kamu. Link reset akan dikirimkan.
    </p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="email@example.com">
    </div>
    <div id="reset-msg" style="font-size:13px;margin-bottom:14px;display:none"></div>
    <button class="btn btn-navy" id="btn-reset" style="margin-bottom:14px">
      Kirim Link Reset
    </button>
    <button class="btn btn-ghost" onclick="showView('login')">← Kembali ke Login</button>
  </div>

  <!-- View: Set Password Baru -->
  <div id="view-setpw" style="display:none">
    <p id="setpw-desc" style="font-size:14px;font-weight:500;color:#1565c0;margin-bottom:20px;line-height:1.5">
      Buat password baru untuk akun kamu.
    </p>
    <div class="form-group">
      <label>Password Baru</label>
      <input type="password" id="new-pw" placeholder="Minimal 8 karakter">
    </div>
    <div class="form-group">
      <label>Konfirmasi Password</label>
      <input type="password" id="new-pw2" placeholder="Ulangi password">
    </div>
    <div id="setpw-error" class="error-msg"></div>
    <button class="btn btn-navy" id="btn-setpw" >Simpan Password</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
  // Konstanta — ganti nilai di bawah dengan yang sebenarnya
  const SUPABASE_URL      = 'https://tovitqcgmsmohbjmaifk.supabase.co';
  const SUPABASE_ANON_KEY = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdml0cWNnbXNtb2hiam1haWZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTk3NzksImV4cCI6MjA5MjMzNTc3OX0.m8PsmN_B6XnI5IHx_n-_sBPUy4g_Es8uX8-chgnlSqc
`;
  const GAS_URL           = `https://script.google.com/macros/s/AKfycbwplBjReoLeOI5I2bzkUjQMZfK6Yc5CKyywm8-yFhyV6vQJD66nWIS7lpo88ujum6o0/exec`;
  const HUB_URL  = 'hub.html';

  // Redirect setelah login — cek apakah ada return URL dari QR checkin
  function redirectAfterLogin() {
    const returnUrl = localStorage.getItem('lho_checkin_return');
    if (returnUrl) {
      localStorage.removeItem('lho_checkin_return');
      window.location.href = returnUrl;
    } else {
      window.location.href = HUB_URL;
    }
  }
  const APP_URL           = 'https://olittleharmony.github.io/member/';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showView(name) {
    ['login','forgot','setpw'].forEach(v => {
      document.getElementById('view-'+v).style.display = v === name ? '' : 'none';
    });
  }

  function setLoading(btn, loading, label) {
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Memproses...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn._orig || label;
    }
  }

  // Cek token di URL hash (recovery / invite)
  async function checkHash() {
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params   = new URLSearchParams(hash.replace('#',''));
      const type     = params.get('type');
      const accToken = params.get('access_token');
      const refToken = params.get('refresh_token');

      if ((type === 'recovery' || type === 'invite') && accToken) {
        const { error } = await sb.auth.setSession({ access_token: accToken, refresh_token: refToken || '' });
        history.replaceState(null, '', window.location.pathname);
        if (!error) {
          const desc = type === 'invite'
            ? 'Selamat datang! Buat password pribadi untuk mengganti password sementara kamu.'
            : 'Masukkan password baru kamu.';
          document.getElementById('setpw-desc').textContent = desc;
          showView('setpw');
          return;
        }
      }
    }

    // Tidak ada hash → cek session aktif
    const { data: { session } } = await sb.auth.getSession();
    if (session) await redirectByRole(session.user);
  }

  async function redirectByRole(user) {
    // Cek first login
    const isFirst = Math.abs(new Date(user.updated_at) - new Date(user.created_at)) < 5000;
    if (isFirst) {
      document.getElementById('setpw-desc').textContent =
        'Selamat datang! Buat password pribadi untuk mengganti password sementara kamu.';
      showView('setpw');
      return;
    }
    // Redirect ke hub
    redirectAfterLogin();
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-login');
    errEl.style.display = 'none';

    if (!email || !pw) {
      errEl.textContent = 'Email dan password wajib diisi.';
      errEl.style.display = 'block'; return;
    }

    setLoading(btn, true);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) throw error;
      await redirectByRole(data.user);
    } catch (err) {
      errEl.textContent = err.message === 'Invalid login credentials'
        ? 'Email atau password salah.' : err.message;
      errEl.style.display = 'block';
    } finally {
      setLoading(btn, false, 'Masuk');
    }
  }

  async function handleReset() {
    const email = document.getElementById('reset-email').value.trim();
    const msgEl = document.getElementById('reset-msg');
    const btn   = document.getElementById('btn-reset');
    msgEl.style.display = 'none';

    if (!email) {
      msgEl.style.color = '#c62828';
      msgEl.textContent = 'Email wajib diisi.';
      msgEl.style.display = 'block'; return;
    }

    setLoading(btn, true);
    try {
      // Kirim via GAS (bukan Supabase SMTP yang sering error)
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'resetPassword', email }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      msgEl.style.color   = '#2e7d32';
      msgEl.textContent   = 'Link reset password sudah dikirim ke email kamu. Cek inbox (dan folder spam).';
      msgEl.style.display = 'block';
    } catch(err) {
      msgEl.style.color   = '#c62828';
      msgEl.textContent   = err.message;
      msgEl.style.display = 'block';
    } finally {
      setLoading(btn, false, 'Kirim Link Reset');
    }
  }

  async function handleSetPw() {
    const pw1   = document.getElementById('new-pw').value;
    const pw2   = document.getElementById('new-pw2').value;
    const errEl = document.getElementById('setpw-error');
    const btn   = document.getElementById('btn-setpw');
    errEl.style.display = 'none';

    if (pw1.length < 8) {
      errEl.textContent = 'Password minimal 8 karakter.';
      errEl.style.display = 'block'; return;
    }
    if (pw1 !== pw2) {
      errEl.textContent = 'Password tidak sama.';
      errEl.style.display = 'block'; return;
    }

    setLoading(btn, true);
    try {
      const { error } = await sb.auth.updateUser({ password: pw1 });
      if (error) throw error;
      redirectAfterLogin();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      setLoading(btn, false, 'Simpan Password');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('view-login').style.display !== 'none') {
      handleLogin();
    }
  });

  // Bind tombol setelah DOM ready
  document.getElementById('btn-login').addEventListener('click', handleLogin);
  document.getElementById('btn-reset').addEventListener('click', handleReset);
  document.getElementById('btn-setpw').addEventListener('click', handleSetPw);

  checkHash();
</script>
</body>
</html>
