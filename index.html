<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Harmony Orchestra – Kami Pindah!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0e0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg-lines {
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 79px,
        rgba(210,170,90,0.05) 79px,
        rgba(210,170,90,0.05) 80px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 79px,
        rgba(210,170,90,0.05) 79px,
        rgba(210,170,90,0.05) 80px
      );
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210,170,90,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 90%;
    text-align: center;
    padding: 56px 48px 48px;
    border: 0.5px solid rgba(210,170,90,0.3);
    border-radius: 2px;
    background: rgba(20,17,12,0.85);
    backdrop-filter: blur(8px);
    animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .ornament-line {
    flex: 1;
    max-width: 60px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, rgba(210,170,90,0.6));
  }

  .ornament-line.right {
    background: linear-gradient(90deg, rgba(210,170,90,0.6), transparent);
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: rgba(210,170,90,0.8);
    transform: rotate(45deg);
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(210,170,90,0.7);
    font-weight: 500;
    margin-bottom: 20px;
  }

  .emoji-note {
    font-size: 36px;
    margin-bottom: 20px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: #f5ead4;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    color: rgba(210,170,90,0.9);
  }

  .desc {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(245,234,212,0.55);
    margin-bottom: 12px;
  }

  .old-url {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'DM Sans', monospace;
    color: rgba(245,234,212,0.3);
    text-decoration: line-through;
    margin-bottom: 36px;
  }

  .divider {
    height: 0.5px;
    background: linear-gradient(90deg, transparent, rgba(210,170,90,0.2), transparent);
    margin: 0 0 32px;
  }

  .new-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(210,170,90,0.5);
    margin-bottom: 10px;
  }

  .new-url {
    font-family: 'DM Sans', monospace;
    font-size: 16px;
    font-weight: 500;
    color: rgba(210,170,90,0.95);
    margin-bottom: 28px;
    letter-spacing: 0.01em;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: rgba(210,170,90,0.1);
    border: 0.5px solid rgba(210,170,90,0.5);
    border-radius: 1px;
    color: #f5ead4;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(210,170,90,0.08);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .btn:hover::before { transform: translateX(0); }

  .btn:hover {
    border-color: rgba(210,170,90,0.8);
    color: rgba(210,170,90,0.95);
  }

  .btn-arrow {
    font-size: 16px;
    transition: transform 0.2s ease;
  }

  .btn:hover .btn-arrow { transform: translateX(4px); }

  .footer-note {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(245,234,212,0.2);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="bg-lines"></div>
<div class="glow"></div>

<div class="card">

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>

  <p class="label">Little Harmony Orchestra</p>

  <span class="emoji-note">🎻</span>

  <h1>Kami pindah ke<br><em>rumah baru</em></h1>

  <p class="desc">
    Halaman ini sudah tidak aktif.<br>
    Website resmi LHO kini hadir di alamat baru yang lebih baik.
  </p>

  <p class="old-url">olittleharmony.github.io</p>

  <div class="divider"></div>

  <p class="new-label">Alamat baru kami</p>
  <p class="new-url">littleharmonyorchestra.com</p>

  <a class="btn" href="https://littleharmonyorchestra.com">
    Kunjungi website baru
    <span class="btn-arrow">→</span>
  </a>

  <p class="footer-note">Sampai jumpa di sana ✦</p>

</div>

</body>
</html>
